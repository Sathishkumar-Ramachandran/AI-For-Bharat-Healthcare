version: '3.8'

services:
  healthcare-app:
    build: .
    container_name: healthcare-agentic-system
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - NOVA_MODEL_ID=${NOVA_MODEL_ID:-us.amazon.nova-lite-v1:0}
    volumes:
      - ./database:/app/database
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

